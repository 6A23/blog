<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的主页</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-logo">✦ 主页</div>
    <ul class="nav-links">
      <li><a href="#about">关于</a></li>
      <li><a href="#contact">联系</a></li>
      <li><a href="guestbook.html">留言板</a></li>
    </ul>
    <button class="nav-toggle" id="navToggle">☰</button>
  </nav>

  <!-- Hero 区域 -->
  <section class="hero">
    <div class="hero-bg">
      <span class="blob blob1"></span>
      <span class="blob blob2"></span>
      <span class="blob blob3"></span>
    </div>
    <div class="hero-content">
      <div class="avatar-wrapper">
        <div class="avatar">😊</div>
      </div>
      <h1 class="hero-title">你好，我是 <span class="highlight">6A23xzh</span> 👋</h1>
      <p class="hero-sub">设计师 · 开发者 · 创造者</p>
      <div class="hero-badges">
        <span class="badge">🎨 UI/UX</span>
        <span class="badge">💻 前端开发</span>
        <span class="badge">🚀 开源爱好者</span>
      </div>
      <a href="#about" class="btn-primary">了解更多 ↓</a>
    </div>
  </section>

  <!-- About 区域 -->
  <section class="about" id="about">
    <div class="container">
      <h2 class="section-title">关于<span class="highlight">我</span></h2>
      <div class="about-grid">
        <div class="about-card">
          <div class="card-icon">🌟</div>
          <h3>我是谁</h3>
          <p>一个热爱创造的开发者，喜欢将想法变成现实。专注于构建美观且实用的 Web 体验。</p>
        </div>
        <div class="about-card">
          <div class="card-icon">🎯</div>
          <h3>我的目标</h3>
          <p>通过技术和设计的结合，打造令人愉悦的数字产品，持续学习、持续进步。</p>
        </div>
        <div class="about-card">
          <div class="card-icon">🎮</div>
          <h3>业余爱好</h3>
          <p>摄影、游戏、阅读技术博客，以及偶尔的户外徒步探险。</p>
        </div>
      </div>
    </div>
  </section>

  <!-- Contact 区域 -->
  <section class="contact" id="contact">
    <div class="container">
      <h2 class="section-title">联系<span class="highlight">我</span></h2>
      <p class="contact-sub">有任何想法或合作意向，欢迎联系我！</p>
      <div class="contact-links">
        <a href="mailto:your@email.com" class="contact-btn">📧 邮件</a>
        <a href="https://github.com/6A23" target="_blank" class="contact-btn">🐙 GitHub</a>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <p>用 ❤️ 制作 · 2026</p>
  </footer>

  <script src="main.js"></script>
</body>
</html>
