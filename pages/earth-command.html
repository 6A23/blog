<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌍 地球指挥中心 · ECC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #060d1a;
      --panel: #0b1628;
      --border: rgba(0, 200, 255, 0.15);
      --cyan: #00c8ff;
      --green: #00ff88;
      --red: #ff3860;
      --orange: #ffb347;
      --yellow: #ffd93d;
      --text: #c8e6ff;
      --text-dim: #5a7a9a;
      --glow: 0 0 12px rgba(0, 200, 255, 0.4);
      --glow-red: 0 0 12px rgba(255, 56, 96, 0.5);
      --glow-green: 0 0 12px rgba(0, 255, 136, 0.4);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── 星空背景 ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 10%, rgba(0,80,160,0.18) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 90%, rgba(0,60,120,0.15) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── 导航 ── */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 32px;
      background: rgba(6, 13, 26, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.95rem;
      color: var(--cyan);
      text-decoration: none;
      letter-spacing: 2px;
      text-shadow: var(--glow);
    }

    .nav-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--text-dim);
      letter-spacing: 3px;
    }

    .nav-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      color: var(--green);
      text-shadow: var(--glow-green);
    }

    /* ── 主容器 ── */
    .ecc-wrap {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 90px 24px 60px;
    }

    /* ── 页头 ── */
    .ecc-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .ecc-header h1 {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      font-weight: 700;
      color: var(--cyan);
      text-shadow: var(--glow);
      letter-spacing: 4px;
      margin-bottom: 8px;
    }

    .ecc-header .sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      color: var(--text-dim);
      letter-spacing: 6px;
    }

    /* ── 威胁等级横幅 ── */
    .threat-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 28px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .threat-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .threat-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-dim);
      letter-spacing: 2px;
    }

    .threat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.5rem;
      font-weight: 700;
      transition: all 0.4s;
    }

    .threat-bar-wrap {
      flex: 1;
      min-width: 200px;
    }

    .threat-bar-track {
      height: 8px;
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      overflow: hidden;
    }

    .threat-bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.5s ease, background 0.5s;
    }

    .threat-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .threat-controls label {
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    .threat-input {
      width: 60px;
      padding: 6px 10px;
      background: rgba(0,200,255,0.06);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--cyan);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      text-align: center;
      outline: none;
    }

    .btn {
      padding: 7px 18px;
      border: none;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .btn-cyan {
      background: rgba(0,200,255,0.15);
      color: var(--cyan);
      border: 1px solid rgba(0,200,255,0.35);
    }

    .btn-cyan:hover {
      background: rgba(0,200,255,0.28);
      box-shadow: var(--glow);
    }

    .btn-red {
      background: rgba(255,56,96,0.15);
      color: var(--red);
      border: 1px solid rgba(255,56,96,0.35);
    }

    .btn-red:hover {
      background: rgba(255,56,96,0.28);
      box-shadow: var(--glow-red);
    }

    .btn-green {
      background: rgba(0,255,136,0.12);
      color: var(--green);
      border: 1px solid rgba(0,255,136,0.3);
    }

    .btn-green:hover {
      background: rgba(0,255,136,0.22);
      box-shadow: var(--glow-green);
    }

    /* ── 主网格 ── */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    @media (max-width: 760px) {
      .main-grid { grid-template-columns: 1fr; }
    }

    /* ── 面板 ── */
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(0,200,255,0.04);
    }

    .panel-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 3px;
      color: var(--cyan);
      text-shadow: var(--glow);
    }

    .panel-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: var(--glow-green);
      animation: blink 2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .panel-body { padding: 20px; }

    /* ── 地球状态格子 ── */
    .status-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat-item {
      background: rgba(0,200,255,0.04);
      border: 1px solid rgba(0,200,255,0.1);
      border-radius: 10px;
      padding: 14px;
    }

    .stat-label {
      font-size: 0.72rem;
      color: var(--text-dim);
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--cyan);
    }

    .stat-value.warn { color: var(--orange); }
    .stat-value.ok { color: var(--green); }

    /* ── 设施列表 ── */
    .facility-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .facility-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(0,200,255,0.03);
      border: 1px solid rgba(0,200,255,0.1);
      border-radius: 10px;
      padding: 12px 16px;
      transition: border-color 0.2s, background 0.2s;
    }

    .facility-item:hover {
      border-color: rgba(0,200,255,0.3);
      background: rgba(0,200,255,0.06);
    }

    .facility-icon { font-size: 1.5rem; flex-shrink: 0; }

    .facility-info { flex: 1; min-width: 0; }

    .facility-name {
      font-weight: 600;
      font-size: 0.88rem;
      color: var(--text);
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .facility-loc {
      font-size: 0.73rem;
      color: var(--text-dim);
    }

    .facility-status {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      padding: 4px 10px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    .status-active   { background: rgba(0,255,136,0.1);  color: var(--green);  border: 1px solid rgba(0,255,136,0.25); }
    .status-standby  { background: rgba(90,120,154,0.1); color: var(--text-dim); border: 1px solid rgba(90,120,154,0.2); }
    .status-launched { background: rgba(255,56,96,0.12); color: var(--red);    border: 1px solid rgba(255,56,96,0.3); animation: blink 1s infinite; }
    .status-deployed { background: rgba(0,200,255,0.12); color: var(--cyan);   border: 1px solid rgba(0,200,255,0.3); }
    .status-docked   { background: rgba(255,179,71,0.1); color: var(--orange); border: 1px solid rgba(255,179,71,0.25); }

    .facility-btns {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .btn-sm {
      padding: 4px 10px;
      font-size: 0.72rem;
      border-radius: 5px;
    }

    /* ── 事件日志 ── */
    .event-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 340px;
      overflow-y: auto;
    }

    .event-list::-webkit-scrollbar { width: 4px; }
    .event-list::-webkit-scrollbar-thumb { background: rgba(0,200,255,0.2); border-radius: 999px; }

    .event-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 10px 14px;
      background: rgba(0,200,255,0.03);
      border-radius: 8px;
      border-left: 3px solid transparent;
      font-size: 0.82rem;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .event-item.INFO     { border-left-color: rgba(0,200,255,0.4); }
    .event-item.WARN     { border-left-color: var(--orange); }
    .event-item.CRITICAL { border-left-color: var(--red); background: rgba(255,56,96,0.04); }

    .event-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }

    .event-content { flex: 1; }

    .event-msg { color: var(--text); line-height: 1.5; }

    .event-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-dim);
      margin-top: 3px;
    }

    /* ── API 终端面板 ── */
    .api-panel {
      margin-top: 0;
    }

    .api-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 10px;
    }

    .api-item {
      background: rgba(0,200,255,0.04);
      border: 1px solid rgba(0,200,255,0.1);
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .api-item:hover {
      border-color: rgba(0,200,255,0.35);
      background: rgba(0,200,255,0.08);
    }

    .api-method {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(0,200,255,0.12);
      color: var(--cyan);
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .api-path {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      color: var(--text);
      margin-bottom: 4px;
      word-break: break-all;
    }

    .api-desc {
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    /* ── 响应预览 ── */
    .response-panel {
      margin-top: 20px;
    }

    .response-box {
      background: #02080f;
      border-radius: 10px;
      padding: 18px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      color: #7ec8e3;
      overflow-x: auto;
      min-height: 80px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .response-box .json-key   { color: #79c0ff; }
    .response-box .json-str   { color: #a5d6ff; }
    .response-box .json-num   { color: var(--green); }
    .response-box .json-bool  { color: var(--orange); }
    .response-box .json-null  { color: var(--red); }

    .loading-dots::after {
      content: '...';
      animation: dots 1.2s steps(4, end) infinite;
    }

    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      padding: 12px 22px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      z-index: 999;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.3s;
      pointer-events: none;
      border: 1px solid;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.success {
      background: rgba(0,255,136,0.12);
      color: var(--green);
      border-color: rgba(0,255,136,0.3);
    }

    .toast.error {
      background: rgba(255,56,96,0.12);
      color: var(--red);
      border-color: rgba(255,56,96,0.3);
    }

    .toast.info {
      background: rgba(0,200,255,0.12);
      color: var(--cyan);
      border-color: rgba(0,200,255,0.3);
    }

    /* ── 全宽面板 ── */
    .full-panel { margin-bottom: 20px; }

    /* ── 响应式 ── */
    @media (max-width: 560px) {
      .ecc-wrap { padding: 80px 14px 50px; }
      .threat-banner { flex-direction: column; align-items: flex-start; }
      .facility-btns { flex-direction: column; }
      .navbar { padding: 12px 16px; }
      .nav-title { display: none; }
    }
  </style>
</head>
<body>

  <!-- 导航 -->
  <nav class="navbar">
    <a href="../index.html" class="nav-logo">← 主页</a>
    <span class="nav-title">EARTH COMMAND CENTER · ECC-v3.7</span>
    <span class="nav-time" id="navTime">--:--:--</span>
  </nav>

  <div class="ecc-wrap">

    <!-- 页头 -->
    <div class="ecc-header">
      <h1>🌍 EARTH COMMAND CENTER</h1>
      <p class="sub">GLOBAL THREAT MONITORING · FACILITY CONTROL · EVENT LOGGING</p>
    </div>

    <!-- 威胁等级横幅 -->
    <div class="threat-banner" id="threatBanner">
      <div class="threat-left">
        <div>
          <div class="threat-badge">GLOBAL THREAT LEVEL</div>
          <div class="threat-value" id="threatValue">载入中...</div>
        </div>
        <div class="threat-bar-wrap">
          <div class="threat-bar-track">
            <div class="threat-bar-fill" id="threatBarFill"></div>
          </div>
        </div>
      </div>
      <div class="threat-controls">
        <label>调整等级：</label>
        <input type="number" class="threat-input" id="threatInput" min="1" max="10" value="2" />
        <button class="btn btn-cyan" onclick="setThreatLevel()">设置</button>
      </div>
    </div>

    <!-- 主网格 -->
    <div class="main-grid">

      <!-- 地球状态 -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">▶ 地球实时状态</span>
          <div style="display:flex;align-items:center;gap:10px">
            <button class="btn btn-cyan" style="padding:4px 12px;font-size:0.75rem" onclick="loadStatus()">刷新</button>
            <div class="panel-dot"></div>
          </div>
        </div>
        <div class="panel-body">
          <div class="status-grid" id="statusGrid">
            <div class="stat-item"><div class="stat-label">STATUS</div><div class="stat-value" style="font-size:0.85rem;color:var(--text-dim)">载入中...</div></div>
          </div>
        </div>
      </div>

      <!-- 事件日志 -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">▶ 事件日志</span>
          <div style="display:flex;align-items:center;gap:10px">
            <button class="btn btn-cyan" style="padding:4px 12px;font-size:0.75rem" onclick="loadEvents()">刷新</button>
            <div class="panel-dot" style="background:var(--orange);box-shadow:0 0 8px rgba(255,179,71,0.5)"></div>
          </div>
        </div>
        <div class="panel-body" style="padding:14px">
          <div class="event-list" id="eventList">
            <div style="color:var(--text-dim);font-size:0.82rem;padding:20px;text-align:center">载入中...</div>
          </div>
        </div>
      </div>

    </div>

    <!-- 设施控制 -->
    <div class="panel full-panel">
      <div class="panel-header">
        <span class="panel-title">▶ 全球设施控制台</span>
        <div style="display:flex;align-items:center;gap:10px">
          <button class="btn btn-cyan" style="padding:4px 12px;font-size:0.75rem" onclick="loadFacilities()">刷新</button>
          <div class="panel-dot" style="background:var(--red);box-shadow:0 0 8px rgba(255,56,96,0.5)"></div>
        </div>
      </div>
      <div class="panel-body" style="padding:14px">
        <div class="facility-list" id="facilityList">
          <div style="color:var(--text-dim);font-size:0.82rem;padding:20px;text-align:center">载入中...</div>
        </div>
      </div>
    </div>

    <!-- API 接口文档 -->
    <div class="panel full-panel api-panel">
      <div class="panel-header">
        <span class="panel-title">▶ API 接口文档</span>
        <div class="panel-dot" style="background:var(--yellow);box-shadow:0 0 8px rgba(255,217,61,0.4)"></div>
      </div>
      <div class="panel-body">
        <div class="api-grid" id="apiGrid"></div>
      </div>
    </div>

    <!-- API 响应预览 -->
    <div class="panel full-panel response-panel">
      <div class="panel-header">
        <span class="panel-title">▶ API 响应预览</span>
        <span style="font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--text-dim)" id="apiPathDisplay">点击上方接口查看响应</span>
      </div>
      <div class="panel-body" style="padding:14px">
        <div class="response-box" id="responseBox">// 点击上方任意 API 接口，在此查看响应数据</div>
      </div>
    </div>

  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ── 配置 ──
    const API_BASE = '/api/earth';

    // ── 时钟 ──
    function updateClock() {
      const now = new Date();
      document.getElementById('navTime').textContent =
        now.toLocaleTimeString('zh-CN', { hour12: false }) + ' UTC+8';
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ── Toast ──
    function showToast(msg, type = 'info') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = `toast ${type} show`;
      clearTimeout(el._t);
      el._t = setTimeout(() => el.classList.remove('show'), 3000);
    }

    // ── JSON 语法高亮 ──
    function highlight(json) {
      return json
        .replace(/("[\w\u4e00-\u9fa5\s\-\/\.:,<>%°×·]+")(\s*:)/g, '<span class="json-key">$1</span>$2')
        .replace(/:\s*("([^"]*)")/g, ': <span class="json-str">"$2"</span>')
        .replace(/:\s*(\d+\.?\d*)/g, ': <span class="json-num">$1</span>')
        .replace(/:\s*(true|false)/g, ': <span class="json-bool">$1</span>')
        .replace(/:\s*(null)/g, ': <span class="json-null">$1</span>');
    }

    // ── 调用 API ──
    async function callAPI(url, label) {
      document.getElementById('apiPathDisplay').textContent = url;
      document.getElementById('responseBox').innerHTML = '<span class="loading-dots">加载中</span>';
      try {
        const res = await fetch(url);
        const data = await res.json();
        document.getElementById('responseBox').innerHTML = highlight(JSON.stringify(data, null, 2));
        return data;
      } catch (e) {
        document.getElementById('responseBox').textContent = '// 网络错误：' + e.message;
        return null;
      }
    }

    // ── 威胁等级颜色 ──
    function threatColor(level) {
      if (level <= 2) return '#00ff88';
      if (level <= 4) return '#ffd93d';
      if (level <= 6) return '#ffb347';
      if (level <= 8) return '#ff6b6b';
      return '#ff3860';
    }

    // ── 渲染威胁等级 ──
    function renderThreat(level, label) {
      const color = threatColor(level);
      document.getElementById('threatValue').textContent = label || '未知';
      document.getElementById('threatValue').style.color = color;
      document.getElementById('threatValue').style.textShadow = `0 0 12px ${color}80`;
      document.getElementById('threatBarFill').style.width = (level / 10 * 100) + '%';
      document.getElementById('threatBarFill').style.background =
        `linear-gradient(90deg, #00ff88, ${color})`;
      document.getElementById('threatInput').value = level;
    }

    // ── 加载威胁等级 ──
    async function loadThreat() {
      const data = await callAPI(API_BASE + '?query=threat', '威胁等级');
      if (data && data.code === 200) {
        renderThreat(data.threat_level, data.threat_label);
      }
    }

    // ── 设置威胁等级 ──
    async function setThreatLevel() {
      const level = document.getElementById('threatInput').value;
      showToast('发送威胁等级指令...', 'info');
      const data = await callAPI(`${API_BASE}?action=alert&level=${level}`, '设置威胁等级');
      if (data && data.code === 200) {
        renderThreat(data.new_level, data.new_label);
        showToast(data.message, 'success');
        loadEvents();
      } else if (data) {
        showToast(data.message || '设置失败', 'error');
      }
    }

    // ── 加载地球状态 ──
    async function loadStatus() {
      const data = await callAPI(API_BASE + '?query=status', '地球状态');
      if (!data || data.code !== 200) return;
      const d = data.data;
      const items = [
        { label: '全球人口', value: d.population_display, cls: 'ok' },
        { label: 'CO₂ 浓度', value: d.co2_ppm + ' ppm', cls: d.co2_ppm > 420 ? 'warn' : 'ok' },
        { label: '地表平均温度', value: d.surface_temp_c + ' °C', cls: d.surface_temp_c > 15 ? 'warn' : 'ok' },
        { label: '海平面上升速率', value: d.sea_level_rise_mm + ' mm/yr', cls: 'warn' },
        { label: '活跃火山数量', value: d.active_volcanoes + ' 座', cls: 'warn' },
        { label: '磁场强度', value: d.magnetic_field_nt.toLocaleString() + ' nT', cls: 'ok' },
        { label: '地球自转速度', value: d.rotation_speed_kmh.toLocaleString() + ' km/h', cls: 'ok' },
        { label: '月球距离', value: d.moon_distance_km.toLocaleString() + ' km', cls: 'ok' },
      ];
      document.getElementById('statusGrid').innerHTML = items.map(i => `
        <div class="stat-item">
          <div class="stat-label">${i.label.toUpperCase()}</div>
          <div class="stat-value ${i.cls}">${i.value}</div>
        </div>
      `).join('');
    }

    // ── 加载事件日志 ──
    async function loadEvents() {
      const data = await callAPI(API_BASE + '?query=events', '事件日志');
      if (!data || data.code !== 200) return;
      document.getElementById('eventList').innerHTML = data.events.map(e => `
        <div class="event-item ${e.level}">
          <span class="event-icon">${e.icon}</span>
          <div class="event-content">
            <div class="event-msg">${e.msg}</div>
            <div class="event-time">${new Date(e.time).toLocaleString('zh-CN')}</div>
          </div>
        </div>
      `).join('');
    }

    // ── 加载设施 ──
    async function loadFacilities() {
      const data = await callAPI(API_BASE + '?query=facilities', '设施列表');
      if (!data || data.code !== 200) return;
      document.getElementById('facilityList').innerHTML = data.facilities.map(f => `
        <div class="facility-item" id="fac-${f.id}">
          <span class="facility-icon">${f.icon}</span>
          <div class="facility-info">
            <div class="facility-name">${f.name}</div>
            <div class="facility-loc">📍 ${f.location}</div>
          </div>
          <span class="facility-status status-${f.status}">${f.status.toUpperCase()}</span>
          <div class="facility-btns">
            <button class="btn btn-green btn-sm" onclick="launchFacility('${f.id}','${f.name}')">▶ 发射</button>
            <button class="btn btn-red btn-sm"   onclick="abortFacility('${f.id}','${f.name}')">■ 终止</button>
          </div>
        </div>
      `).join('');
    }

    // ── 发射设施 ──
    async function launchFacility(id, name) {
      showToast(`正在发送发射指令：${name}`, 'info');
      const data = await callAPI(`${API_BASE}?action=launch&id=${id}`, `发射 ${name}`);
      if (data && data.code === 200) {
        showToast(data.message, 'success');
        renderThreat(data.threat_level, data.threat_label);
        await loadFacilities();
        await loadEvents();
      } else if (data) {
        showToast(data.message || '指令失败', 'error');
      }
    }

    // ── 终止设施 ──
    async function abortFacility(id, name) {
      showToast(`正在发送终止指令：${name}`, 'info');
      const data = await callAPI(`${API_BASE}?action=abort&id=${id}`, `终止 ${name}`);
      if (data && data.code === 200) {
        showToast(data.message, 'success');
        renderThreat(data.threat_level, data.threat_label);
        await loadFacilities();
        await loadEvents();
      } else if (data) {
        showToast(data.message || '指令失败', 'error');
      }
    }

    // ── API 文档 ──
    const apiDocs = [
      { path: '/api/earth',                          desc: '获取指挥中心总览' },
      { path: '/api/earth?query=status',             desc: '地球实时状态数据' },
      { path: '/api/earth?query=threat',             desc: '全球威胁等级详情' },
      { path: '/api/earth?query=events',             desc: '最近事件日志列表' },
      { path: '/api/earth?query=facilities',         desc: '所有虚构设施列表' },
      { path: '/api/earth?action=launch&id=nuke1',   desc: '发射 MX-9 导弹' },
      { path: '/api/earth?action=launch&id=laser1',  desc: '激活 HELIOS 轨道炮' },
      { path: '/api/earth?action=abort&id=nuke1',    desc: '终止 MX-9 导弹' },
      { path: '/api/earth?action=alert&level=5',     desc: '设置威胁等级为 5' },
      { path: '/api/earth?action=alert&level=1',     desc: '解除威胁，恢复和平' },
    ];

    document.getElementById('apiGrid').innerHTML = apiDocs.map(a => `
      <div class="api-item" onclick="callAPI('${a.path}', '${a.desc}')">
        <div class="api-method">GET</div>
        <div class="api-path">${a.path}</div>
        <div class="api-desc">${a.desc}</div>
      </div>
    `).join('');

    // ── 初始化加载 ──
    async function init() {
      await Promise.all([loadThreat(), loadStatus(), loadEvents(), loadFacilities()]);
    }

    init();

    // 每 60 秒自动刷新状态
    setInterval(loadStatus, 60000);
  </script>
</body>
</html>
