<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>项家两兄弟 API</title>
  <link rel="stylesheet" href="../style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    .api-wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 120px 24px 80px;
    }

    .api-wrap .section-title { text-align: left; margin-bottom: 8px; }
    .api-desc { color: var(--text-light); font-size: 0.95rem; margin-bottom: 36px; }

    .input-box {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    .input-box input {
      flex: 1;
      padding: 14px 20px;
      border: 2px solid #f0f0f0;
      border-radius: 999px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      outline: none;
      background: white;
      color: var(--text);
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      transition: border-color 0.2s;
    }

    .input-box input:focus { border-color: var(--primary); }

    .input-box button {
      padding: 14px 28px;
      background: linear-gradient(135deg, var(--primary), #ff8e53);
      color: white;
      border: none;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(255,107,107,0.35);
      transition: transform 0.2s;
    }

    .input-box button:hover { transform: translateY(-2px); }

    .result-card {
      background: white;
      border-radius: 20px;
      padding: 32px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(0,0,0,0.05);
      display: none;
      animation: fadeUp 0.4s ease;
    }

    .result-card.show { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .result-avatar {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #ff8e53);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      flex-shrink: 0;
    }

    .result-name { font-size: 1.4rem; font-weight: 700; }

    .result-tag {
      display: inline-block;
      margin-top: 4px;
      font-size: 0.75rem;
      background: var(--primary);
      color: white;
      padding: 2px 10px;
      border-radius: 999px;
      font-weight: 600;
    }

    .result-text {
      font-size: 1rem;
      line-height: 1.9;
      color: var(--text);
      background: var(--bg);
      border-radius: 12px;
      padding: 20px 24px;
      border-left: 4px solid var(--primary);
      white-space: pre-wrap;
    }

    .json-box { margin-top: 20px; }

    .json-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-light);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .json-code {
      background: #1e1e2e;
      color: #cdd6f4;
      border-radius: 12px;
      padding: 16px 20px;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      line-height: 1.7;
      overflow-x: auto;
    }

    .json-key { color: #89b4fa; }
    .json-str { color: #a6e3a1; }
    .json-num { color: #fab387; }

    /* API 使用说明 */
    .api-docs {
      background: #1e1e2e;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 28px;
      color: #cdd6f4;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      line-height: 1.8;
    }

    .api-docs .comment { color: #6c7086; }
    .api-docs .url { color: #89dceb; }
    .api-docs .method { color: #a6e3a1; font-weight: 700; }

    .not-found {
      text-align: center;
      padding: 32px;
      color: var(--text-light);
      font-size: 0.95rem;
      display: none;
    }

    .not-found.show { display: block; }
    .not-found-icon { font-size: 2.5rem; margin-bottom: 12px; }

    .quick-btns {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .quick-btn {
      padding: 8px 18px;
      border-radius: 999px;
      border: 2px solid rgba(0,0,0,0.08);
      background: white;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text);
    }

    .quick-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="../index.html" class="nav-logo">✦ 主页</a>
    <ul class="nav-links">
      <li><a href="../index.html#about">关于</a></li>
      <li><a href="../guestbook.html">留言板</a></li>
      <li><a href="../weather.html">天气</a></li>
    </ul>
    <button class="nav-toggle" id="navToggle">☰</button>
  </nav>

  <div class="api-wrap">
    <h2 class="section-title">项家<span class="highlight">两兄弟</span> API</h2>
    <p class="api-desc">输入姓名，获取专属介绍 🐉</p>

    <!-- API 调用说明 -->
    <div class="api-docs">
      <div class="comment"># API 接口地址</div>
      <div><span class="method">GET</span> <span class="url">/api/xiong?name=项羽</span></div>
      <br>
      <div class="comment"># 用 fetch 调用示例</div>
      <div>fetch(<span class="json-str">'https://你的域名/api/xiong?name=项羽'</span>)</div>
      <div>&nbsp;&nbsp;.then(r => r.json())</div>
      <div>&nbsp;&nbsp;.then(data => console.log(data))</div>
    </div>

    <div class="quick-btns">
      <button class="quick-btn" onclick="query('项羽')">项羽</button>
      <button class="quick-btn" onclick="query('项庄')">项庄</button>
      <button class="quick-btn" onclick="query('项伯')">项伯</button>
      <button class="quick-btn" onclick="query('项梁')">项梁</button>
      <button class="quick-btn" onclick="query('项梓涵')">项梓涵</button>
      <button class="quick-btn" onclick="query('项梓淇')">项梓淇</button>
    </div>

    <div class="input-box">
      <input type="text" id="nameInput" placeholder="输入姓名，如：项羽" maxlength="20" />
      <button onclick="query()">查询</button>
    </div>

    <div class="not-found" id="notFound">
      <div class="not-found-icon">🤔</div>
      <div>此人不在项家族谱中，换个名字试试？</div>
    </div>

    <div class="result-card" id="resultCard">
      <div class="result-header">
        <div class="result-avatar" id="resAvatar">⚔️</div>
        <div>
          <div class="result-name" id="resName">—</div>
          <span class="result-tag" id="resTag">—</span>
        </div>
      </div>
      <div class="result-text" id="resText">—</div>
      <div class="json-box">
        <div class="json-title">JSON 响应</div>
        <pre class="json-code" id="jsonOutput"></pre>
      </div>
    </div>
  </div>

  <script>
    const navbar = document.querySelector('.navbar');
    window.addEventListener('scroll', () => navbar.classList.toggle('scrolled', window.scrollY > 20));
    document.getElementById('navToggle').addEventListener('click', () => {
      document.querySelector('.nav-links').classList.toggle('open');
    });

    document.getElementById('nameInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') query();
    });

    async function query(name) {
      const input = name || document.getElementById('nameInput').value.trim();
      if (!input) return;
      document.getElementById('nameInput').value = input;

      document.getElementById('resultCard').classList.remove('show');
      document.getElementById('notFound').classList.remove('show');

      const res = await fetch(`/api/xiong?name=${encodeURIComponent(input)}`);
      const data = await res.json();

      if (data.code === 404) {
        document.getElementById('notFound').classList.add('show');
        return;
      }

      const avatarMap = { '西楚霸王':'⚔️', '项羽堂弟':'🗡️', '项羽叔父':'🛡️', '项羽叔父·起义首领':'👑', '体育健将':'🏃', '画画高手':'🎨' };
      document.getElementById('resAvatar').textContent = avatarMap[data.tag] || '🐉';
      document.getElementById('resName').textContent = data.name;
      document.getElementById('resTag').textContent = data.tag;
      document.getElementById('resText').textContent = data.description;

      document.getElementById('jsonOutput').innerHTML =
        `<span class="json-str">{</span>\n` +
        `  <span class="json-key">"code"</span>: <span class="json-num">${data.code}</span>,\n` +
        `  <span class="json-key">"name"</span>: <span class="json-str">"${data.name}"</span>,\n` +
        `  <span class="json-key">"tag"</span>: <span class="json-str">"${data.tag}"</span>,\n` +
        `  <span class="json-key">"description"</span>: <span class="json-str">"${data.description.substring(0, 60).replace(/\n/g,' ')}..."</span>\n` +
        `<span class="json-str">}</span>`;

      document.getElementById('resultCard').classList.add('show');
    }
  </script>
</body>
</html>
